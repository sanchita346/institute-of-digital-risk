<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 80" width="380" height="80">
  <defs>
    <linearGradient id="faceTop2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E8500A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceLeft2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A1A1A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2D2D2D;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceRight2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3D3D3D;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#555555;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Cube icon at left, scaled for horizontal lockup -->
  <g transform="translate(8, 4) scale(0.72)">
    <!-- Top face -->
    <polygon points="50,12 82,30 50,48 18,30" fill="url(#faceTop2)" />
    <!-- Left face -->
    <polygon points="18,30 50,48 50,78 18,60" fill="url(#faceLeft2)" />
    <!-- Right face -->
    <polygon points="50,48 82,30 82,60 50,78" fill="url(#faceRight2)" />
    <!-- Shield overlay -->
    <polygon points="50,18 58,23 58,33 50,38 42,33 42,23" fill="none" stroke="white" stroke-width="1.5" opacity="0.85"/>
    <line x1="50" y1="22" x2="50" y2="35" stroke="white" stroke-width="1.2" opacity="0.85"/>
    <!-- Edge highlights -->
    <line x1="50" y1="12" x2="82" y2="30" stroke="white" stroke-width="0.6" opacity="0.4"/>
    <line x1="50" y1="12" x2="18" y2="30" stroke="white" stroke-width="0.6" opacity="0.4"/>
    <line x1="50" y1="48" x2="50" y2="78" stroke="white" stroke-width="0.6" opacity="0.3"/>
  </g>

  <!-- Divider line -->
  <line x1="72" y1="16" x2="72" y2="64" stroke="#FF6B1A" stroke-width="1.5" opacity="0.6"/>

  <!-- Text: IDR large -->
  <text x="84" y="38" font-family="'Arial Black', 'Helvetica Neue', sans-serif" font-weight="900" font-size="28" letter-spacing="3" fill="#1A1A1A">IDR</text>

  <!-- Text: Institute of Digital Risk -->
  <text x="85" y="56" font-family="'Arial', 'Helvetica Neue', sans-serif" font-weight="400" font-size="10.5" letter-spacing="2.2" fill="#555555">INSTITUTE OF DIGITAL RISK</text>
</svg>
